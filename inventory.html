<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zopro Inventory</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
margin:0;
}

nav{
background:#222;
padding:15px;
text-align:center;
}

nav a{
color:#d4af37;
text-decoration:none;
margin:10px;
font-weight:bold;
}

.container{
padding:20px;
}

h1{
color:#d4af37;
text-align:center;
}

.card{
background:#1a1a1a;
padding:20px;
margin-bottom:20px;
border-radius:12px;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.price{
color:#d4af37;
font-weight:bold;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="inventory.html">Inventory</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">
<h1>Available Inventory</h1>

<input 
type="text" 
id="searchInput" 
placeholder="Search products..." 
onkeyup="searchProducts()"
style="width:100%;padding:14px;margin-bottom:20px;border-radius:8px;border:none;font-size:18px;"
>
<button onclick="logout()" style="width:100%;padding:14px;margin-bottom:20px;background:#d4af37;color:black;border:none;border-radius:8px;font-size:18px;font-weight:bold;">
Logout
</button>
<div id="inventory"></div>

</div>

<script>

  if(localStorage.getItem("zoproLogin") !== "yes"){
window.location.href = "login.html";
}
const csvUrl =
"https://docs.google.com/spreadsheets/d/1-ix2RF6hd9FUjprQ3XXWtIn6DERgxcnYhOKr7fJsJWs/gviz/tq?tqx=out:csv&sheet=Sheet1";

fetch(csvUrl)
.then(response => response.text())
.then(data => {

const rows = data.split("\n").slice(1);

let html = "";

rows.forEach(row => {

const cols = row.split(",").map(item =>
item.replace(/^"|"$/g, "").trim()
);

if(cols.length >= 5){






html += `
<div class="card">

<h2>${cols[0]}</h2>

<p><strong>Qty:</strong> ${cols[1]}</p>

<p class="price">Price: $${cols[2]}</p>

<p><strong>Status:</strong> ${cols[3]}</p>

<p><strong>Category:</strong> ${cols[5]}</p>

<a href="sms:5013137716?body=Hi ZO Pro,%0A%0AProduct: ${cols[0]}%0AQuantity:%0ABarbershop Name:%0ADelivery City:%0A%0AThank you."
style="display:block;background:#d4af37;color:black;text-align:center;padding:14px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:15px;">
Order Now
</a>

${cols[4] ? `<img src="${cols[4]}" alt="${cols[0]}" style="width:100%;border-radius:10px;margin-top:15px;">` : ""}
`;

}

});

document.getElementById("inventory").innerHTML = html;

});
function searchProducts(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}
  function logout(){
  localStorage.removeItem("zoproLogin");
  window.location.href = "login.html";
}
</script>

</body>
</html>
