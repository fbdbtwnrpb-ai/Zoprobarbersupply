<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zopro Admin Dashboard</title>
<style>
body{background:#111;color:white;font-family:Arial;margin:0;padding:20px;}
h1{color:#d4af37;}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:none;font-size:16px;}
button{background:#d4af37;color:black;font-weight:bold;}
.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;}
</style>
</head>
<body>

<h1>Zopro Admin Inventory</h1>

<div id="login">
<input id="password" type="password" placeholder="Admin Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

<input id="product" placeholder="Product Name">
<input id="qty" placeholder="Quantity">
<input id="status" placeholder="Status: In Stock / Low / Sold Out">
<button onclick="addItem()">Add Inventory Item</button>

<h2>Inventory List</h2>
<div id="list"></div>

</div>

<script>
let adminPassword = "zopro123";
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];

function login(){
  let pass = document.getElementById("password").value;
  if(pass === adminPassword){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
    showItems();
  } else {
    alert("Wrong password");
  }
}

function addItem(){
  let product = document.getElementById("product").value;
  let qty = document.getElementById("qty").value;
  let status = document.getElementById("status").value;

  inventory.push({product, qty, status});
  localStorage.setItem("inventory", JSON.stringify(inventory));
  showItems();
}

function deleteItem(index){
  inventory.splice(index,1);
  localStorage.setItem("inventory", JSON.stringify(inventory));
  showItems();
}

function showItems(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  inventory.forEach((item,index)=>{
    list.innerHTML += `
    <div class="card">
      <h3>${item.product}</h3>
      <p>Quantity: ${item.qty}</p>
      <p>Status: ${item.status}</p>
      <button onclick="deleteItem(${index})">Delete</button>
    </div>`;
  });
}
</script>

</body>
</html>
